<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advanced Google Cast Web Receiver with Real-time Streaming">
    <title>Google Cast Web Receiver - Advanced</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="receiver-container" class="receiver-container">
        <!-- Media Display -->
        <div id="media-display" class="media-display">
            <video id="media-video" class="media-video" controls></video>
            <audio id="media-audio" class="media-audio"></audio>
        </div>

        <!-- Status Panel -->
        <div id="status-panel" class="status-panel">
            <div class="status-header">Cast Receiver Status</div>
            <div class="status-content">
                <div class="status-item"><span>Connection:</span> <span id="connection-status" class="status-value">Idle</span></div>
                <div class="status-item"><span>Media:</span> <span id="media-status" class="status-value">None</span></div>
                <div class="status-item"><span>FPS:</span> <span id="fps-counter" class="status-value">0</span></div>
                <div class="status-item"><span>Latency:</span> <span id="latency-meter" class="status-value">0ms</span></div>
            </div>
        </div>

        <!-- Controls Panel -->
        <div id="controls-panel" class="controls-panel">
            <button id="btn-play" class="control-btn">▶ Play</button>
            <button id="btn-pause" class="control-btn">⏸ Pause</button>
            <button id="btn-stop" class="control-btn">⏹ Stop</button>
            <button id="btn-fullscreen" class="control-btn">⛶ Fullscreen</button>
        </div>

        <!-- Volume Control -->
        <div class="volume-control">
            <label>Volume: <span id="volume-value">100</span>%</label>
            <input type="range" id="volume-slider" min="0" max="100" value="100">
        </div>

        <!-- Debug Panel -->
        <div id="debug-panel" class="debug-panel">
            <h3>Debug Console</h3>
            <div id="debug-log" class="debug-log"></div>
            <input type="text" id="debug-input" placeholder="Enter debug command...">
        </div>
    </div>

    <script src="cast-framework.js"></script>
    <script src="media-engine.js"></script>
    <script src="network-handler.js"></script>
    <script src="performance-monitor.js"></script>
    <script src="app.js"></script>
</body>
</html>
